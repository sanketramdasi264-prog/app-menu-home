<style>

    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #444; }
    input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }

    .list-header { display: flex; font-weight: bold; background: #eee; padding: 10px; border-radius: 5px; margin-top: 10px; }
    .list-container { margin-bottom: 15px; }

    .list-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #f1f1f1; cursor: grab; transition: background 0.15s; user-select: none; }
    .list-item:active { cursor: grabbing; }
    .list-item.dragging { opacity: 0.4; background: #fff3e0; }
    .list-item.drag-over { border-top: 2.5px solid var(--secondary); }
    .list-item input[type="checkbox"] { width: 22px; height: 22px; margin-right: 8px; accent-color: var(--primary); flex-shrink: 0; }
    .item-text { flex: 2; border: none; background: transparent; font-size: 15px; padding: 5px; width: 100%; }
    .qty-input { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; max-width: 80px; text-align: center; }
    .drag-handle { font-size: 18px; color: #bbb; margin-right: 6px; cursor: grab; flex-shrink: 0; }

    .btn-add { background: #e8f5e9; color: #2e7d32; border: 2px dashed #2e7d32; padding: 10px; border-radius: 8px; font-size: 15px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 15px; }
    .btn-main { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; }
    .btn-secondary { background: #444; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; width: 100%; cursor: pointer; }

    #export-container { position: fixed; left: -9999px; top: 0; }

    .p-header-info { text-align: center; font-size: 60px; margin-bottom: 50px; color: #333; }
    .p-list-area { display: flex; gap: 70px; flex-grow: 1; justify-content: center; align-items: flex-start; }
    .p-column { flex: 1; }
    .full-width { flex: 0 0 75%; }
    .p-table { width: 100%; border-collapse: collapse; background: #fff; }
    .p-table th { background: #ffe082; padding: 25px; font-size: 52px; border: 2px solid #444; text-align: left; }
    .p-table th:last-child { text-align: center; }
    .p-table td { padding: 20px 25px; font-size: 46px; border: 1.5px solid #ccc; border-left: 2px solid #444; border-right: 2px solid #444; color: #000; line-height: 1.2; }
    .p-table td:last-child { text-align: center; }
    .p-table tr:last-child td { border-bottom: 2px solid #444; }
    .p-footer { text-align: center; margin-top: auto; padding-top: 40px; padding-bottom: 20px; }
    .p-footer-text { font-size: 50px; font-weight: 600; color: #333; margin-bottom: 25px; }

    .p-logo { position: absolute; top: 110px; right: 120px; width: 320px; height: 320px; object-fit: contain; }

function renderList(structure) {
    const container = document.getElementById('mainList');
    container.innerHTML = "";
    itemCounter = 0;
    structure.forEach((entry) => {
        if (entry.type === 'item') {
            const idx = itemCounter++;
            addItemToParent(container, entry.name, idx, entry.checked || false, entry.qty || '');
        }
    });
    initDragDrop();
}

function addItemToParent(parent, name, idx, checked, qty) {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.dataset.idx = idx;
    div.setAttribute('draggable', true);
    div.innerHTML = `
        <span class="drag-handle" title="ड्रॅग करा">⠿</span>
        <input type="checkbox" id="chk-${idx}" ${checked ? 'checked' : ''}>
        <input type="text" class="item-text" id="txt-${idx}" value="${name}" placeholder="साहित्याचे नाव">
        <input type="text" class="qty-input" id="qty-${idx}" value="${qty}" placeholder="प्रमाण">`;
    parent.appendChild(div);
}

function addNewItem() {
    const container = document.getElementById('mainList');
    const idx = itemCounter++;
    const div = document.createElement('div');
    div.className = 'list-item';
    div.dataset.idx = idx;
    div.setAttribute('draggable', true);
    div.innerHTML = `
        <span class="drag-handle" title="ड्रॅग करा">⠿</span>
        <input type="checkbox" id="chk-${idx}">
        <input type="text" class="item-text" id="txt-${idx}" value="" placeholder="साहित्याचे नाव">
        <input type="text" class="qty-input" id="qty-${idx}" value="" placeholder="प्रमाण">`;
    container.appendChild(div);
    initDragDrop();
    setTimeout(() => document.getElementById(`txt-${idx}`).focus(), 100);
}

function initDragDrop() {
    const items = document.querySelectorAll('.list-item');
    let dragSrc = null;
    items.forEach(item => {
        item.addEventListener('dragstart', function(e) {
            dragSrc = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', function() {
            this.classList.remove('dragging');
            document.querySelectorAll('.list-item').forEach(i => i.classList.remove('drag-over'));
        });
        item.addEventListener('dragover', function(e) {
            e.preventDefault();
            if (this !== dragSrc) {
                document.querySelectorAll('.list-item').forEach(i => i.classList.remove('drag-over'));
                this.classList.add('drag-over');
            }
        });
        item.addEventListener('drop', function(e) {
            e.preventDefault();
            if (dragSrc && this !== dragSrc) {
                const parent = this.parentNode;
                const items = Array.from(parent.querySelectorAll(':scope > .list-item'));
                const srcIdx = items.indexOf(dragSrc);
                const tgtIdx = items.indexOf(this);
                if (srcIdx > -1 && tgtIdx > -1) {
                    if (srcIdx < tgtIdx) parent.insertBefore(dragSrc, this.nextSibling);
                    else parent.insertBefore(dragSrc, this);
                }
            }
            document.querySelectorAll('.list-item').forEach(i => i.classList.remove('drag-over'));
        });
    });
}

function collectCurrentStructure() {
    const structure = [];
    document.querySelectorAll('.list-item').forEach(item => {
        const idx = item.dataset.idx;
        const chk = document.getElementById(`chk-${idx}`);
        const txt = document.getElementById(`txt-${idx}`);
        const qty = document.getElementById(`qty-${idx}`);
        if (txt) structure.push({ type: 'item', name: txt.value, qty: qty ? qty.value : '', checked: chk ? chk.checked : false });
    });
    return structure;
}

function collectSelectedItems() {
    const selected = [];
    document.querySelectorAll('.list-item').forEach(item => {
        const idx = item.dataset.idx;
        const chk = document.getElementById(`chk-${idx}`);
        const txt = document.getElementById(`txt-${idx}`);
        const qty = document.getElementById(`qty-${idx}`);
        if (chk && chk.checked && txt && txt.value.trim()) {
            selected.push({ name: txt.value.trim(), qty: qty ? qty.value : '' });
        }
    });
    return selected;
}

// ===================== EXPORT — सर्व pages डाउनलोड =====================
async function processExport() {
    const selected = collectSelectedItems();
    if (!selected.length) return alert("साहित्य निवडा!");

    saveToHistory({
        poojaName: document.getElementById('poojaName').value,
        guruName: document.getElementById('guruName').value,
        contactNo: document.getElementById('contactNo').value,
        structure: collectCurrentStructure()
    });

    const btn = document.getElementById('btnDownload');
    btn.disabled = true;

    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    progressWrap.style.display = 'block';

    const container = document.getElementById('export-container');
    container.innerHTML = "";

    const itemsPerPage = 46;
    const totalPages = Math.ceil(selected.length / itemsPerPage);

    for (let p = 0; p < totalPages; p++) {
        btn.innerHTML = `⏳ पान ${p + 1} / ${totalPages} तयार होत आहे...`;
        progressBar.style.width = Math.round(((p) / totalPages) * 100) + '%';
        progressText.textContent = `पान ${p + 1} / ${totalPages} डाउनलोड होत आहे...`;

        const pageData = selected.slice(p * itemsPerPage, (p + 1) * itemsPerPage);
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page-template';

        let listHTML = "";
        if (pageData.length <= 23) {
            listHTML = `<div class="p-column full-width">${renderTable(pageData)}</div>`;
        } else {
            const mid = Math.ceil(pageData.length / 2);
            listHTML = `<div class="p-column">${renderTable(pageData.slice(0, mid))}</div><div class="p-column">${renderTable(pageData.slice(mid))}</div>`;
        }

        pageDiv.innerHTML = `
            <div class="p-content">
                <img src="${LOGO_URL}" class="p-logo" crossorigin="anonymous">
                <div class="p-ganesh">॥ श्री ॥</div>
                <h1 class="p-title">${document.getElementById('poojaName').value || "साहित्य यादी"}</h1>
                <div class="p-header-info">${document.getElementById('guruName').value || "_______"} | <b>संपर्क:</b> ${document.getElementById('contactNo').value || "_______"}</div>
                <div class="p-list-area">${listHTML}</div>
                <div class="p-footer">
                    <div class="p-footer-text">🙏 कृपया वरील सर्व साहित्य पूजेपूर्वी उपलब्ध करून ठेवावे 🙏</div>
                    <div class="p-page-num">पान क्र. ${p + 1} / ${totalPages}</div>
                </div>
            </div>`;

        container.appendChild(pageDiv);

        // canvas तयार होण्याची प्रतीक्षा
        await new Promise(resolve => setTimeout(resolve, 100));

        const canvas = await html2canvas(pageDiv, { scale: 1, useCORS: true });
        const imageData = canvas.toDataURL("image/png");

        // Download trigger — प्रत्येक पानासाठी वेगळा
        await new Promise(resolve => {
            const link = document.createElement('a');
            link.download = `Sahitya_Yadi_Paan_${p + 1}.png`;
            link.href = imageData;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(resolve, 600); // browser ला थोडा वेळ द्या
        });

        container.innerHTML = ""; // मेमरी मुक्त करा
    }

    progressBar.style.width = '100%';
    progressText.textContent = `✅ सर्व ${totalPages} पाने डाउनलोड झाली!`;
    btn.innerHTML = "📥 डाउनलोड आणि शेअर";
    btn.disabled = false;
    setTimeout(() => {
        progressWrap.style.display = 'none';
        progressText.textContent = '';
    }, 3000);
}

function renderTable(data) {
    const rows = data.map(item => `<tr><td>${item.name}</td><td>${item.qty || '-'}</td></tr>`).join('');
    return `<table class="p-table"><thead><tr><th>साहित्याचे नाव</th><th style="width:30%">प्रमाण</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ===================== HISTORY =====================
function toggleHistory(show) {
    document.getElementById('historyOverlay').style.display = show ? 'flex' : 'none';
    if (show) updateHistoryList();
}

function saveToHistory(data) {
    let history = JSON.parse(localStorage.getItem('pooja_history') || '[]');
    history.unshift({ id: Date.now(), date: new Date().toLocaleString('mr-IN'), data: data });
    localStorage.setItem('pooja_history', JSON.stringify(history.slice(0, 10)));
}

function deleteHistoryItem(id, e) {
    e.stopPropagation();
    if (!confirm('ही हिस्ट्री डिलिट करायची का?')) return;
    let history = JSON.parse(localStorage.getItem('pooja_history') || '[]');
    history = history.filter(h => h.id !== id);
    localStorage.setItem('pooja_history', JSON.stringify(history));
    updateHistoryList();
}

function updateHistoryList() {
    const content = document.getElementById('historyListContent');
    const history = JSON.parse(localStorage.getItem('pooja_history') || '[]');
    if (history.length === 0) {
        content.innerHTML = "<p>हिस्ट्री रिकामी आहे.</p>";
        return;
    }
    content.innerHTML = history.map(h => `
        <div class="history-card">
            <div style="flex:1;">
                <b>${h.data.poojaName || 'साहित्य यादी'}</b><br>
                <small style="color:#888;">${h.date}</small>
            </div>
            <button class="history-load-btn" onclick="loadHistoryItem(${h.id})">लोड करा ➔</button>
            <button class="history-del-btn" onclick="deleteHistoryItem(${h.id}, event)">🗑️ डिलिट</button>
        </div>`).join('');
}

function loadHistoryItem(id) {
    const history = JSON.parse(localStorage.getItem('pooja_history') || '[]');
    const entry = history.find(h => h.id === id);
    if (!entry) return;
    const d = entry.data;
    document.getElementById('poojaName').value = d.poojaName || '';
    document.getElementById('guruName').value = d.guruName || '';
    document.getElementById('contactNo').value = d.contactNo || '';
    if (d.structure) {
        renderList(d.structure.filter(i => i.type === 'item'));
    } else if (d.items) {
        const container = document.getElementById('mainList');
        container.innerHTML = '';
        itemCounter = 0;
        d.items.forEach((item) => {
            const idx = itemCounter++;
            addItemToParent(container, item.name, idx, item.checked, item.qty);
        });
        initDragDrop();
    }
    toggleHistory(false);
}

init();
</script>
