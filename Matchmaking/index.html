<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmKarmyog - अचूक कुंडली मिलन</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>अचूक कुंडली मिलन</h2>
        <div class="input-group">
            <input type="text" id="brideName" placeholder="वधूचे नाव (उदा. पूजा)">
            <input type="text" id="groomName" placeholder="वराचे नाव (उदा. राहुल)">
        </div>
        <button id="calculateBtn">गुण तपासा</button>

        <div id="resultArea" class="hidden">
            <div class="score-card">
                <h1 id="finalScore">0</h1>
                <p>३६ पैकी गुण</p>
            </div>
            <table id="scoreTable">
                </table>
            <div id="remarks" class="remarks-box"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
