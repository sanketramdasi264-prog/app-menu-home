<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>गुण मिलन | OmKarmyog</title>
    <link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi&family=Cinzel+Decorative:wght@700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --maroon: #3a0a0a; --gold: #c9933a; --gold-lt: #e8b84b; --text: #fdf0d5; --border: rgba(201,147,58,0.35); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--maroon); font-family: 'Tiro Devanagari Hindi', serif; color: var(--text); padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .om { font-size: 2rem; color: var(--gold-lt); display: block; }
        h1 { font-family: 'Cinzel Decorative', serif; color: var(--gold-lt); }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: rgba(90,20,20,0.45); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 15px; backdrop-filter: blur(8px); }
        .card h2 { font-size: 1rem; color: var(--gold-lt); margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: var(--gold); margin-bottom: 5px; }
        input, select { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px; margin-bottom: 12px; font-family: inherit; }
        .auto-status { font-size: 11px; color: #7ef09a; display: none; margin-bottom: 10px; }
        #calculateBtn { width: 100%; background: linear-gradient(135deg, var(--gold) 0%, #a06820 100%); border: none; padding: 14px; border-radius: 50px; font-weight: bold; cursor: pointer; color: #3a0a0a; }
        #resultArea { display: none; margin-top: 25px; }
        .score-hero { text-align: center; padding: 25px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--border); }
        .score-number { font-size: 4rem; font-family: 'Cinzel Decorative', serif; color: var(--gold-lt); }
        .score-table { width: 100%; margin-top: 15px; border-collapse: collapse; }
        .score-table td { padding: 8px; border-bottom: 1px solid rgba(201,147,58,0.1); }
        .score-table td:last-child { text-align: right; color: var(--gold-lt); }
        .remarks-box { background: rgba(0,0,0,0.3); padding: 12px; border-left: 3px solid var(--gold); margin-top: 15px; border-radius: 0 8px 8px 0; }
        #downloadBtn { width: 100%; background: #2e7d32; color: white; border: none; padding: 12px; border-radius: 50px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        #reportExport { position: fixed; left: -9999px; top: 0; width: 400px; background: white; font-family: 'Kalam', cursive; padding: 40px; color: #003366; }
    </style>
</head>
<body>
    <div class="header">
        <span class="om">ॐ</span>
        <h1>गुण मिलन</h1>
    </div>
    <div class="container">
        <div class="card">
            <h2>🪷 वधू</h2>
            <label>नाव</label>
            <input type="text" id="brideName" placeholder="नाव..." autocomplete="off">
            <div id="vadhuAutoStatus" class="auto-status">✨ नावावरून नक्षत्र निवडले</div>
            <label>नक्षत्र</label><select id="vadhuNak"></select>
            <label>राशी</label><select id="vadhuRashi"></select>
        </div>
        <div class="card">
            <h2>🪔 वर</h2>
            <label>नाव</label>
            <input type="text" id="groomName" placeholder="नाव..." autocomplete="off">
            <div id="varaAutoStatus" class="auto-status">✨ नावावरून नक्षत्र निवडले</div>
            <label>नक्षत्र</label><select id="varaNak"></select>
            <label>राशी</label><select id="varaRashi"></select>
        </div>
        <button id="calculateBtn">✨ गुण तपासा</button>

        <div id="resultArea">
            <div class="score-hero">
                <div class="score-number" id="finalScore">0</div>
                <div style="font-size: 0.9rem;">३६ पैकी गुण</div>
            </div>
            <div class="card" style="margin-top: 15px;">
                <table class="score-table" id="scoreTable"></table>
                <div id="remarks" class="remarks-box"></div>
                <button id="downloadBtn">📄 रिपोर्ट डाऊनलोड करा</button>
            </div>
        </div>
    </div>
    <div id="reportExport"></div>
    <script src="script.js"></script>
</body>
</html>
