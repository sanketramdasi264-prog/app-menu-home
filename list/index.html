<!DOCTYPE html>

<style>
    :root { --primary: #c62828; --secondary: #ef6c00; --bg: #f5f5f5; }
    * { box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    
    .app { max-width: 500px; width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
    
    .input-group { margin-bottom: 12px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #444; }
    input[type="text"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; }

    .list-header { display: flex; font-weight: bold; background: #eee; padding: 10px; border-radius: 5px; margin-top: 10px; }
    .list-container { margin-bottom: 15px; }

    /* --- Normal Item --- */
    .list-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #f1f1f1; cursor: grab; transition: background 0.15s; user-select: none; }
    .list-item:active { cursor: grabbing; }
    .list-item.dragging { opacity: 0.4; background: #fff3e0; }
    .list-item.drag-over { border-top: 2.5px solid var(--secondary); }
    .list-item input[type="checkbox"] { width: 22px; height: 22px; margin-right: 8px; accent-color: var(--primary); flex-shrink: 0; }
    .item-text { flex: 2; border: none; background: transparent; font-size: 15px; padding: 5px; width: 100%; }
    .qty-input { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 4px; max-width: 80px; text-align: center; }
    .drag-handle { font-size: 18px; color: #bbb; margin-right: 6px; cursor: grab; flex-shrink: 0; }

    /* --- Sub-heading Row --- */
    .subheading-row { display: flex; align-items: center; padding: 7px 10px; background: linear-gradient(90deg, #ff6f00 0%, #ffb300 100%); border-radius: 7px; margin: 10px 0 2px 0; cursor: pointer; user-select: none; box-shadow: 0 2px 6px rgba(255,111,0,0.13); }
    .subheading-row .sh-label { flex: 1; font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.5px; }
    .subheading-row .sh-toggle { font-size: 18px; color: #fff; margin-right: 6px; transition: transform 0.2s; }
    .subheading-row .sh-toggle.collapsed { transform: rotate(-90deg); }
    .subheading-row input[type="checkbox"] { width: 20px; height: 20px; margin-right: 10px; accent-color: #fff; flex-shrink: 0; }

    /* --- Collapsed section items --- */
    .section-items.hidden { display: none; }

    .btn-add { background: #e8f5e9; color: #2e7d32; border: 2px dashed #2e7d32; padding: 10px; border-radius: 8px; font-size: 15px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 15px; }
    .btn-main { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; width: 100%; cursor: pointer; margin-bottom: 10px; }
    .btn-secondary { background: #444; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; width: 100%; cursor: pointer; }

    /* Export Styles */
    #export-container { position: fixed; left: -9999px; top: 0; }
    .page-template { width: 2130px; height: 3231px; background: #fffaf0; padding: 120px 100px; position: relative; }
    .p-content { height: 100%; display: flex; flex-direction: column; }
    .p-ganesh { text-align: center; font-size: 70px; font-weight: bold; color: #c62828; margin-bottom: 10px; }
    .p-title { text-align: center; font-size: 130px; color: #c62828; margin: 0 0 20px 0; font-weight: 700; border-bottom: 6px solid #c62828; display: inline-block; width: 100%; }
    .p-header-info { text-align: center; font-size: 60px; margin-bottom: 50px; color: #333; }
    .p-list-area { display: flex; gap: 70px; flex-grow: 1; justify-content: center; align-items: flex-start; }
    .p-column { flex: 1; }
    .full-width { flex: 0 0 75%; }
    .p-table { width: 100%; border-collapse: collapse; background: #fff; }
    .p-table th { background: #ffe082; padding: 25px; font-size: 52px; border: 2px solid #444; text-align: left; }
    .p-table th:last-child { text-align: center; }
    .p-table td { padding: 20px 25px; font-size: 46px; border: 1.5px solid #ccc; border-left: 2px solid #444; border-right: 2px solid #444; color: #000; line-height: 1.2; }
    .p-table td:last-child { text-align: center; }
    .p-table tr:last-child td { border-bottom: 2px solid #444; }
    .p-table-subhead td { background: #fff3e0; font-weight: bold; font-size: 44px; color: #bf360c; border-left: 2px solid #444; border-right: 2px solid #444; }
    .p-footer { text-align: center; margin-top: auto; padding-top: 40px; padding-bottom: 20px; }
    .p-footer-text { font-size: 50px; font-weight: 600; color: #333; margin-bottom: 25px; }
    .p-page-num { background: #ffeb3b; padding: 15px 55px; border-radius: 60px; font-size: 42px; display: inline-block; font-weight: bold; border: 3px solid #fdd835; }
    .p-logo { position: absolute; top: 110px; right: 120px; width: 320px; height: 320px; object-fit: contain; }

    /* History Overlay */
    #historyOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
    .history-card { border: 1px solid #ddd; padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .history-load-btn { color: var(--primary); font-weight: 600; cursor: pointer; padding: 6px 10px; border-radius: 6px; background: #fff3f3; border: 1px solid var(--primary); font-size: 13px; white-space: nowrap; }

</style>

let itemCounter = 0;

// ===================== RENDER =====================
function init() {
    renderList(defaultStructure);
    updateHistoryList();
}

function renderList(structure) {
    const container = document.getElementById('mainList');
    container.innerHTML = "";
    itemCounter = 0;

    let currentSectionEl = null;
    let currentSectionId = null;

    structure.forEach((entry) => {
        if (entry.type === 'subheading') {
            const sectionId = 'sec-' + itemCounter++;
            currentSectionId = sectionId;

            // Sub-heading row
            const shDiv = document.createElement('div');
            shDiv.className = 'subheading-row';
            shDiv.dataset.section = sectionId;
            shDiv.dataset.collapsed = entry.collapsed ? '1' : '0';
            shDiv.innerHTML = `
                <input type="checkbox" class="sh-checkbox" title="सर्व निवडा/रद्द करा" onchange="toggleSectionCheck(this, '${sectionId}')">
                <span class="sh-toggle${entry.collapsed ? ' collapsed' : ''}">▼</span>
                <span class="sh-label">📂 ${entry.name}</span>`;
            shDiv.querySelector('.sh-toggle').addEventListener('click', () => toggleSection(sectionId, shDiv));
            shDiv.querySelector('.sh-label').addEventListener('click', () => toggleSection(sectionId, shDiv));
            container.appendChild(shDiv);

            // Container for section items
            const secItemsEl = document.createElement('div');
            secItemsEl.className = 'section-items' + (entry.collapsed ? ' hidden' : '');
            secItemsEl.id = sectionId;
            container.appendChild(secItemsEl);

            currentSectionEl = secItemsEl;
        } else {
            const idx = itemCounter++;
            const parent = currentSectionEl || container;
            addItemToParent(parent, entry.name, idx, entry.checked || false, entry.qty || '', currentSectionId);
        }
    });

    initDragDrop();
}

function addItemToParent(parent, name, idx, checked, qty, sectionId) {
    const div = document.createElement('div');
    div.className = 'list-item';
    div.dataset.idx = idx;
    div.dataset.section = sectionId || '';
    div.setAttribute('draggable', true);
    div.innerHTML = `
        <span class="drag-handle" title="ड्रॅग करा">⠿</span>
        <input type="checkbox" id="chk-${idx}" ${checked ? 'checked' : ''} onchange="updateSectionHeaderCheck('${sectionId}')">
        <input type="text" class="item-text" id="txt-${idx}" value="${name}" placeholder="साहित्याचे नाव">
        <input type="text" class="qty-input" id="qty-${idx}" value="${qty}" placeholder="प्रमाण">`;
    parent.appendChild(div);
}

// ===================== SECTION TOGGLE =====================
function toggleSection(sectionId, shDiv) {
    const sec = document.getElementById(sectionId);
    const arrow = shDiv.querySelector('.sh-toggle');
    if (sec.classList.contains('hidden')) {
        sec.classList.remove('hidden');
        arrow.classList.remove('collapsed');
        shDiv.dataset.collapsed = '0';
    } else {
        sec.classList.add('hidden');
        arrow.classList.add('collapsed');
        shDiv.dataset.collapsed = '1';
    }
}

function toggleSectionCheck(checkbox, sectionId) {
    const sec = document.getElementById(sectionId);
    if (!sec) return;
    sec.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.checked = checkbox.checked; });
}

function updateSectionHeaderCheck(sectionId) {
    if (!sectionId) return;
    const sec = document.getElementById(sectionId);
    const shRow = document.querySelector(`.subheading-row[data-section="${sectionId}"]`);
    if (!sec || !shRow) return;
    const allCbs = sec.querySelectorAll('input[type="checkbox"]');
    const allChecked = Array.from(allCbs).every(cb => cb.checked);
    const shCb = shRow.querySelector('.sh-checkbox');
    if (shCb) shCb.checked = allChecked;
}

// ===================== ADD NEW ITEM =====================
function addNewItem() {
    const container = document.getElementById('mainList');
    const idx = itemCounter++;
    const div = document.createElement('div');
    div.className = 'list-item';
    div.dataset.idx = idx;
    div.dataset.section = '';
    div.setAttribute('draggable', true);
    div.innerHTML = `
        <span class="drag-handle" title="ड्रॅग करा">⠿</span>
        <input type="checkbox" id="chk-${idx}">
        <input type="text" class="item-text" id="txt-${idx}" value="" placeholder="साहित्याचे नाव">
        <input type="text" class="qty-input" id="qty-${idx}" value="" placeholder="प्रमाण">`;
    container.appendChild(div);
    initDragDrop();
    setTimeout(() => document.getElementById(`txt-${idx}`).focus(), 100);
}

// ===================== DRAG AND DROP =====================
function initDragDrop() {
    const items = document.querySelectorAll('.list-item');
    let dragSrc = null;

    items.forEach(item => {
        item.addEventListener('dragstart', function(e) {
            dragSrc = this;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', function() {
            this.classList.remove('dragging');
            document.querySelectorAll('.list-item').forEach(i => i.classList.remove('drag-over'));
        });
        item.addEventListener('dragover', function(e) {
            e.preventDefault();
            if (this !== dragSrc) {
                document.querySelectorAll('.list-item').forEach(i => i.classList.remove('drag-over'));
                this.classList.add('drag-over');
            }
        });
        item.addEventListener('drop', function(e) {
            e.preventDefault();
            if (dragSrc && this !== dragSrc) {
                const parent = this.parentNode;
                const items = Array.from(parent.querySelectorAll(':scope > .list-item'));
                const srcIdx = items.indexOf(dragSrc);
                const tgtIdx = items.indexOf(this);
                if (srcIdx > -1 && tgtIdx > -1) {
                    if (srcIdx < tgtIdx) parent.insertBefore(dragSrc, this.nextSibling);
                    else parent.insertBefore(dragSrc, this);
                }
            }
            document.querySelectorAll('.list-item').forEach(i => i.classList.remove('drag-over'));
        });
    });
}

// ===================== HISTORY =====================
function toggleHistory(show) {
    document.getElementById('historyOverlay').style.display = show ? 'flex' : 'none';
    if (show) updateHistoryList();
}

function saveToHistory(data) {
    let history = JSON.parse(localStorage.getItem('pooja_history') || '[]');
    history.unshift({ id: Date.now(), date: new Date().toLocaleString('mr-IN'), data: data });
    localStorage.setItem('pooja_history', JSON.stringify(history.slice(0, 10)));
}

function deleteHistoryItem(id, e) {
    e.stopPropagation();
    if (!confirm('ही हिस्ट्री डिलिट करायची का?')) return;
    let history = JSON.parse(localStorage.getItem('pooja_history') || '[]');
    history = history.filter(h => h.id !== id);
    localStorage.setItem('pooja_history', JSON.stringify(history));
    updateHistoryList();
}

function updateHistoryList() {
    const content = document.getElementById('historyListContent');
    const history = JSON.parse(localStorage.getItem('pooja_history') || '[]');
    if (history.length === 0) {
        content.innerHTML = "<p>हिस्ट्री रिकामी आहे.</p>";
        return;
    }
    content.innerHTML = history.map(h => `
        <div class="history-card">
            <div style="flex:1;">
                <b>${h.data.poojaName || 'साहित्य यादी'}</b><br>
                <small style="color:#888;">${h.date}</small>
            </div>
            <button class="history-load-btn" onclick="loadHistoryItem(${h.id})">लोड करा ➔</button>
            <button class="history-del-btn" onclick="deleteHistoryItem(${h.id}, event)">🗑️ डिलिट</button>
        </div>`).join('');
}

function loadHistoryItem(id) {
    const history = JSON.parse(localStorage.getItem('pooja_history') || '[]');
    const entry = history.find(h => h.id === id);
    if (!entry) return;
    const d = entry.data;
    document.getElementById('poojaName').value = d.poojaName || '';
    document.getElementById('guruName').value = d.guruName || '';
    document.getElementById('contactNo').value = d.contactNo || '';
    if (d.structure) {
        renderList(d.structure);
    } else if (d.items) {
        // Backward compat: old flat list
        const container = document.getElementById('mainList');
        container.innerHTML = '';
        itemCounter = 0;
        d.items.forEach((item, i) => {
            const idx = itemCounter++;
            addItemToParent(container, item.name, idx, item.checked, item.qty, '');
        });
        initDragDrop();
    }
    toggleHistory(false);
}

// ===================== COLLECT ALL ITEMS =====================
function collectCurrentStructure() {
    const structure = [];
    const container = document.getElementById('mainList');
    const children = container.children;

    for (let i = 0; i < children.length; i++) {
        const el = children[i];
        if (el.classList.contains('subheading-row')) {
            const label = el.querySelector('.sh-label').textContent.replace('📂 ', '').trim();
            const collapsed = el.dataset.collapsed === '1';
            structure.push({ type: 'subheading', name: label, collapsed });
        } else if (el.classList.contains('section-items')) {
            // items inside section
            el.querySelectorAll('.list-item').forEach(item => {
                const idx = item.dataset.idx;
                const chk = document.getElementById(`chk-${idx}`);
                const txt = document.getElementById(`txt-${idx}`);
                const qty = document.getElementById(`qty-${idx}`);
                if (txt) structure.push({ type: 'item', name: txt.value, qty: qty ? qty.value : '', checked: chk ? chk.checked : false });
            });
        } else if (el.classList.contains('list-item')) {
            const idx = el.dataset.idx;
            const chk = document.getElementById(`chk-${idx}`);
            const txt = document.getElementById(`txt-${idx}`);
            const qty = document.getElementById(`qty-${idx}`);
            if (txt) structure.push({ type: 'item', name: txt.value, qty: qty ? qty.value : '', checked: chk ? chk.checked : false });
        }
    }
    return structure;
}

function collectSelectedItems() {
    const selected = [];
    document.querySelectorAll('.list-item').forEach(item => {
        const idx = item.dataset.idx;
        const chk = document.getElementById(`chk-${idx}`);
        const txt = document.getElementById(`txt-${idx}`);
        const qty = document.getElementById(`qty-${idx}`);
        if (chk && chk.checked && txt && txt.value.trim()) {
            selected.push({ name: txt.value.trim(), qty: qty ? qty.value : '' });
        }
    });
    return selected;
}

// ===================== EXPORT =====================
async function processExport() {
    const selected = collectSelectedItems();
    if (!selected.length) return alert("साहित्य निवडा!");

    const structure = collectCurrentStructure();
    saveToHistory({
        poojaName: document.getElementById('poojaName').value,
        guruName: document.getElementById('guruName').value,
        contactNo: document.getElementById('contactNo').value,
        structure: structure
    });

    const btn = document.getElementById('btnDownload');
    btn.innerHTML = "गॅलरीमध्ये सेव्ह होत आहे..."; btn.disabled = true;

    const container = document.getElementById('export-container');
    container.innerHTML = "";

    const itemsPerPage = 46;
    const totalPages = Math.ceil(selected.length / itemsPerPage);

    for (let p = 0; p < totalPages; p++) {
        const pageData = selected.slice(p * itemsPerPage, (p + 1) * itemsPerPage);
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page-template';

        let listHTML = "";
        if (pageData.length <= 23) {
            listHTML = `<div class="p-column full-width">${renderTable(pageData)}</div>`;
        } else {
            const mid = Math.ceil(pageData.length / 2);
            listHTML = `<div class="p-column">${renderTable(pageData.slice(0, mid))}</div><div class="p-column">${renderTable(pageData.slice(mid))}</div>`;
        }

        pageDiv.innerHTML = `
            <div class="p-content">
                <img src="${LOGO_URL}" class="p-logo" crossorigin="anonymous">
                <div class="p-ganesh">॥ श्री ॥</div>
                <h1 class="p-title">${document.getElementById('poojaName').value || "साहित्य यादी"}</h1>
                <div class="p-header-info"> ${document.getElementById('guruName').value || "_______"} | <b>संपर्क:</b> ${document.getElementById('contactNo').value || "_______"}</div>
                <div class="p-list-area">${listHTML}</div>
                <div class="p-footer">
                    <div class="p-footer-text">🙏 कृपया वरील सर्व साहित्य पूजेपूर्वी उपलब्ध करून ठेवावे 🙏</div>
                    <div class="p-page-num">पान क्र. ${p + 1} / ${totalPages}</div>
                </div>
            </div>`;

        container.appendChild(pageDiv);
        const canvas = await html2canvas(pageDiv, { scale: 1, useCORS: true });
        const imageData = canvas.toDataURL("image/png");
        const link = document.createElement('a');
        link.download = `Pooja_List_P${p+1}.png`;
        link.href = imageData;
        link.click();

        try {
            const blob = await (await fetch(imageData)).blob();
            const file = new File([blob], `Pooja_List.png`, { type: 'image/png' });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'पूजा साहित्य यादी', text: 'आमची पूजा साहित्य यादी' });
            }
        } catch (err) {
            console.log("Sharing not supported or cancelled");
        }
    }

    btn.innerHTML = "📥 डाउनलोड आणि शेअर"; btn.disabled = false;
}

function renderTable(data) {
    const rows = data.map(item => `<tr><td>${item.name}</td><td>${item.qty}</td></tr>`).join('');
    return `<table class="p-table"><thead><tr><th>साहित्याचे नाव</th><th style="width:30%">प्रमाण</th></tr></thead><tbody>${rows}</tbody></table>`;
}

init();
</script>
</body>
</html>
